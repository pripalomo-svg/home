name: Auto-aprovar e mergear PRs do Cursor

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  push:
    branches: [main]
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-cursor-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-merge:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      startsWith(github.event.pull_request.head.ref, 'cursor/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Definir números dos PRs
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            ref="${{ github.event.pull_request.head.ref }}"
            if [[ ! "$ref" =~ ^cursor/ ]]; then
              echo "numbers=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "numbers=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            nums=$(gh pr list --state open --json number,headRefName \
              --jq '[.[] | select(.headRefName | startswith("cursor/")) | .number] | join(" ")')
            echo "numbers=${nums}" >> "$GITHUB_OUTPUT"
          fi

      - name: Atualizar branch com a main
        if: steps.meta.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for n in ${{ steps.meta.outputs.numbers }}; do
            gh pr update-branch "$n" --rebase || gh pr update-branch "$n" || true
          done

      - name: Marcar rascunhos como prontos
        if: steps.meta.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for n in ${{ steps.meta.outputs.numbers }}; do
            gh pr ready "$n" || true
          done

      - name: Aprovar
        if: steps.meta.outputs.numbers != ''
        uses: hmarr/auto-approve-action@v4
        continue-on-error: true

      - name: Mergear com squash
        if: steps.meta.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for n in ${{ steps.meta.outputs.numbers }}; do
            gh pr merge "$n" --squash --delete-branch --admin || \
            gh pr merge "$n" --squash --delete-branch || \
            gh pr merge "$n" --auto --squash --delete-branch || true
          done
